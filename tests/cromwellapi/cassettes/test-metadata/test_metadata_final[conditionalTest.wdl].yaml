        false\n}","inputs":"{\"conditional_example.quality_threshold\":90.0,\"conditional_example.samples\":[{\"name\":\"sample1\",\"quality_score\":95.5,\"type\":\"normal\"},{\"name\":\"sample2\",\"quality_score\":85.3,\"type\":\"tumor\"},{\"name\":\"sample3\",\"quality_score\":92.1,\"type\":\"normal\"}]}","workflowUrl":"","labels":"{}"},"calls":{},"outputs":{},"status":"Submitted","id":"580e27ee-b5f7-436d-9535-19c5afe65f88","inputs":{},"labels":{"cromwell-workflow-id":"cromwell-580e27ee-b5f7-436d-9535-19c5afe65f88"},"submission":"2026-05-17T04:54:25.327Z"}'
