        false\n}","inputs":"{\"conditional_example.quality_threshold\":90.0,\"conditional_example.samples\":[{\"name\":\"sample1\",\"quality_score\":95.5,\"type\":\"normal\"},{\"name\":\"sample2\",\"quality_score\":85.3,\"type\":\"tumor\"},{\"name\":\"sample3\",\"quality_score\":92.1,\"type\":\"normal\"}]}","workflowUrl":"","labels":"{}"},"calls":{},"outputs":{},"status":"Submitted","id":"a2862e44-d879-4a62-bbc0-e6a39c5511b3","inputs":{},"labels":{"cromwell-workflow-id":"cromwell-a2862e44-d879-4a62-bbc0-e6a39c5511b3"},"submission":"2026-04-13T17:21:38.780Z"}'
