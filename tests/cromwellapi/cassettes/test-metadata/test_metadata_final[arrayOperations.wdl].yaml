        false\n}","inputs":"{\"ArrayOperations.additional_strings\":[\"foo\",\"bar\"],\"ArrayOperations.input_files\":[\"arrayOperations/data/test1.txt\",\"arrayOperations/data/test2.txt\",\"arrayOperations/data/test3.txt\"],\"ArrayOperations.nested_arrays\":[[\"nested1\",\"nested2\"],[\"nested3\",\"nested4\"]],\"ArrayOperations.numbers\":[1,2,3,4,5],\"ArrayOperations.strings\":[\"hello\",\"world\",\"test\"]}","workflowUrl":"","labels":"{}"},"calls":{},"outputs":{},"status":"Submitted","id":"1b0e4bb6-bfca-4eab-b2a1-054ce5fa1ff8","inputs":{},"labels":{"cromwell-workflow-id":"cromwell-1b0e4bb6-bfca-4eab-b2a1-054ce5fa1ff8"},"submission":"2026-04-19T04:10:30.459Z"}'
