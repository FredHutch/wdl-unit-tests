        sample_info.sequencing,\n            metrics: sample_info.metrics\n        }\n\n        call
        process_sample {\n            input:\n                sample = processed_sample\n        }\n    }\n}\n\n####
        TASK DEFINITIONS\n\ntask process_sample {\n    input {\n        SampleInfo
